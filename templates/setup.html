<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Initial Setup</title>
</head>

<body>
    <div class="app-container {% if status == 'error' %}error{% endif %}">

        <h1>Initialization Portal //</h1>
        <h2>Secure environment setup required</h2>

        <form action="/setup" method="post">
            
            <div class="field-style">
                <label for="club-name">Club Name</label>
                <input type="text" id="club-name" name="name" required autofocus autocomplete="off" placeholder="ColorStack" />
            </div>

            <div class="field-style">
                <label for="url">Enter Supabase Url</label>
                <input type="password" id="url" name="url" required autocomplete="off" />
            </div>

            <div class="field-style">
                <label for="key">Enter Supabase API key</label>
                <input type="password" id="key" name="key" required autocomplete="off" />
            </div>

            <div class="field-style">
                <label for="admin-pass">Choose an Admin Password</label>
                <input type="password" id="admin-pass" name="admin" required autocomplete="off" />
            </div>

            <div class="field-style">
                <label for="escape-pass">Enter an Escape Password. (Must begin with a letter)</label>
                <input type="password" id="escape-pass" name="escape" required autocomplete="off" />
            </div>
            
            <button type="submit">Complete Setup</button>
        </form>
    </div>
</body>

</html>
